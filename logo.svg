<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions matching your website -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subtleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.05"/>
      <feComposite in2="offset-blur" operator="in"/>
    </filter>
  </defs>
  
  <!-- Main circular background -->
  <circle cx="100" cy="100" r="90" fill="url(#primaryGradient)" filter="url(#shadow)"/>
  
  <!-- Inner geometric pattern -->
  <g transform="translate(100,100)">
    <!-- Central hexagon -->
    <polygon points="-20,0 -10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32" 
             fill="url(#subtleGradient)" 
             stroke="rgba(255,255,255,0.3)" 
             stroke-width="1"
             filter="url(#innerShadow)"/>
    
    <!-- Message bubble icon - geometric interpretation -->
    <rect x="-12" y="-8" width="24" height="12" rx="6" 
          fill="none" 
          stroke="url(#accentGradient)" 
          stroke-width="2"/>
    <polygon points="-12,4 -8,8 -4,4" 
             fill="url(#accentGradient)"/>
    
    <!-- Three dots inside bubble -->
    <circle cx="-6" cy="-2" r="1.5" fill="url(#primaryGradient)" opacity="0.7"/>
    <circle cx="0" cy="-2" r="1.5" fill="url(#primaryGradient)" opacity="0.7"/>
    <circle cx="6" cy="-2" r="1.5" fill="url(#primaryGradient)" opacity="0.7"/>
  </g>
  
  <!-- Surrounding orbital elements -->
  <g opacity="0.6">
    <!-- Data flow lines -->
    <circle cx="100" cy="100" r="55" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="2,4">
      <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,6">
      <animateTransform attributeName="transform" type="rotate" values="360 100 100;0 100 100" dur="30s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Corner accent elements -->
  <g opacity="0.4">
    <!-- Top right -->
    <rect x="140" y="40" width="3" height="16" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="146" y="35" width="3" height="26" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="152" y="42" width="3" height="12" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    
    <!-- Bottom left -->
    <rect x="45" y="144" width="3" height="16" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <rect x="51" y="139" width="3" height="26" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <rect x="57" y="146" width="3" height="12" rx="1.5" fill="url(#accentGradient)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="2.5s"/>
    </rect>
  </g>
  
  <!-- Neural network nodes -->
  <g opacity="0.3">
    <circle cx="65" cy="70" r="2" fill="rgba(255,255,255,0.8)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="135" cy="75" r="2" fill="rgba(255,255,255,0.8)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="75" cy="130" r="2" fill="rgba(255,255,255,0.8)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="125" cy="125" r="2" fill="rgba(255,255,255,0.8)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="3s"/>
    </circle>
    
    <!-- Connection lines -->
    <line x1="65" y1="70" x2="80" y2="83" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="135" y1="75" x2="120" y2="83" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="75" y1="130" x2="80" y2="117" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="125" y1="125" x2="120" y2="117" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  
  <!-- Subtle brand mark -->
  <g transform="translate(100,160)" opacity="0.4">
    <rect x="-8" y="-2" width="16" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="-6" y="-6" width="12" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
    <rect x="-4" y="2" width="8" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  </g>
</svg>